<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Solar System Explorer</title>
    <link rel="stylesheet" href="planets.css">
  </head>
  <body>

    <h1>🔭 Solar System Explorer</h1>
    <p class="subtitle">Search a celestial body in our solar system(if you arent an alien the Via Lactea)</p>

    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Search... (e.g. Mars, Pluto, Sun)">
      <button onclick="search()">Search</button>
    </div>

    <div class="suggestions">
      <span onclick="loadBody('Sun')"> Sun</span>
      <span onclick="loadBody('Mercury')">Mercury</span>
      <span onclick="loadBody('Venus')">Venus</span>
      <span onclick="loadBody('Earth')">Earth</span>
      <span onclick="loadBody('Mars')">Mars</span>
      <span onclick="loadBody('Jupiter')">Jupiter</span>
      <span onclick="loadBody('Saturn')">Saturn</span>
      <span onclick="loadBody('Uranus')">Uranus</span>
      <span onclick="loadBody('Neptune')">Neptune</span>
      <span onclick="loadBody('Pluto')">Pluto</span>
      <span onclick="loadBody('Ceres')">Ceres</span>
      <span onclick="loadBody('Eris')">Eris</span>
      <span onclick="loadBody('Halley Comet')">Halley's Comet</span>
    </div>

    <div class="result" id="result" style="display:none">
      <div class="result-image">
        <div class="planet-visual" id="planetVisual"></div>
      </div>
      <div class="result-info">
        <h2 id="bodyName"></h2>
        <p id="bodyDesc"></p>
        <div class="equation-box">
          <div class="eq-label">Key Equation</div>
          <div class="equation" id="bodyEquation"></div>
          <div class="eq-explain" id="bodyEqExplain"></div>
        </div>
        <div class="facts" id="bodyFacts"></div>
      </div>
    </div>

    <div id="notFound" style="display:none" class="not-found">
      Celestial body not found. Try another name!
    </div>

    <script src="planets.js"></script>
 <!-- clickable constellation leading to tribute page -->
<div class="constellation-path" onclick="window.open('tribute.html', '_blank')" title="Meet the great minds">
  <svg width="200" height="200" viewBox="0 0 200 200">
    <!-- star lines -->
    <line x1="100" y1="30" x2="150" y2="80" stroke="white" stroke-width="1" opacity="0.4"/>
    <line x1="150" y1="80" x2="130" y2="140" stroke="white" stroke-width="1" opacity="0.4"/>
    <line x1="130" y1="140" x2="70" y2="140" stroke="white" stroke-width="1" opacity="0.4"/>
    <line x1="70" y1="140" x2="50" y2="80" stroke="white" stroke-width="1" opacity="0.4"/>
    <line x1="50" y1="80" x2="100" y2="30" stroke="white" stroke-width="1" opacity="0.4"/>
    <line x1="50" y1="80" x2="130" y2="140" stroke="white" stroke-width="1" opacity="0.4"/>
    <line x1="150" y1="80" x2="70" y2="140" stroke="white" stroke-width="1" opacity="0.4"/>

    <!-- stars -->
    <circle cx="100" cy="30"  r="4" fill="white" class="star"/>
    <circle cx="150" cy="80"  r="4" fill="white" class="star"/>
    <circle cx="130" cy="140" r="4" fill="white" class="star"/>
    <circle cx="70"  cy="140" r="4" fill="white" class="star"/>
    <circle cx="50"  cy="80"  r="4" fill="white" class="star"/>
    <circle cx="100" cy="100" r="3" fill="#ffe066" class="star"/>
  </svg>
  <p class="constellation-label">✦ Hall of Great Minds</p>
</div> 
</body>
</html>
