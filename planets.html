<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Solar System Explorer</title>
    <link rel="stylesheet" href="planets.css">
  </head>
  <body>

    <h1>  Solar System Explorer</h1>
    <p class="subtitle">Astrophysics and it’s completely different but also still Astrophysics</p>

    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Search... (e.g. Mars, Pluto, Sun)">
      <button onclick="search()">Search</button>
    </div>

    <div class="suggestions">
      <span onclick="loadBody('Sun')"> Sun</span>
      <span onclick="loadBody('Mercury')">Mercury</span>
      <span onclick="loadBody('Venus')">Venus</span>
      <span onclick="loadBody('Earth')">Earth</span>
      <span onclick="loadBody('Mars')">Mars</span>
      <span onclick="loadBody('Jupiter')">Jupiter</span>
      <span onclick="loadBody('Saturn')">Saturn</span>
      <span onclick="loadBody('Uranus')">Uranus</span>
      <span onclick="loadBody('Neptune')">Neptune</span>
      <span onclick="loadBody('Pluto')">Pluto</span>
      <span onclick="loadBody('Ceres')">Ceres</span>
      <span onclick="loadBody('Eris')">Eris</span>
      <span onclick="loadBody('Halley Comet')">Halley's Comet</span>
    </div>

    <div class="result" id="result" style="display:none">
      <div class="result-image">
        <div class="planet-visual" id="planetVisual"></div>
      </div>
      <div class="result-info">
        <h2 id="bodyName"></h2>
        <p id="bodyDesc"></p>
        <div class="equation-box">
          <div class="eq-label">Key Equation</div>
          <div class="equation" id="bodyEquation"></div>
          <div class="eq-explain" id="bodyEqExplain"></div>
        </div>
        <div class="facts" id="bodyFacts"></div>
      </div>
    </div>

    <div id="notFound" style="display:none" class="not-found">
      Celestial body not found. Try another name!
    </div>

    <script src="planets.js"></script>
<!-- Perseus constellation leading to tribute page -->

<circle cx="70" cy="60" r="4" fill="white" class="star algol"/>
<circle cx="70" cy="60" r="8" fill="white" opacity="0.15" class="algol-glow"/>

</div>
